services:
  rabbitmq:
    image: rabbitmq:4.0-management
    ports:
      - 5672:5672
      - 15672:15672
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  
  client:
    build: ./client/enterprise/candidadate/.
    ports:
      - 4200:4200 
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  
  server:
    build: ./server/.
    ports:
      - 8080:8080
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
  
  consumer:
    build: ./consumers/http-consumer-v1/.
    depends_on:
      - rabbitmq
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
  
  worker:
    build: ./workers/http-worker-v1/.
    ports:
      - 4001:4001
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.75'
          memory: 750M
  
  notificator:
    build: ./notificator/.
    ports:
      - 3001:3001
    depends_on:
      - rabbitmq
    restart: always
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
